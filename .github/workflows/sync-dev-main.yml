name: Sync Dev Branch

on:
  schedule:
    - cron: '0 14 * * 1'   # Monday UTC 14:00 (10 AM EDT) - Warning
    - cron: '0 16 * * 1'   # Monday UTC 16:00 (12 PM EDT) - Sync
  workflow_dispatch:
    inputs:
      action:
        description: 'Which action to run'
        required: true
        type: choice
        options:
          - warning
          - sync

# -----------------------------------------------------------------------------
# Job 1: Warning Notification (2 hours before sync)
# -----------------------------------------------------------------------------
jobs:
  warning:
    name: Send Sync Warning
    runs-on: ubuntu-latest
    if: >-
      github.event.schedule == '0 14 * * 1' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'warning')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch latest branches
        run: |
          git fetch origin main
          git fetch origin dev

      - name: Check for code differences
        id: diff_check
        run: |
          DIFF_OUTPUT=$(git diff origin/main..origin/dev --stat || true)

          if [ -n "$DIFF_OUTPUT" ]; then
            echo "has_diff=true" >> "$GITHUB_OUTPUT"
            FILE_COUNT=$(git diff origin/main..origin/dev --name-only | wc -l)
            echo "file_count=${FILE_COUNT}" >> "$GITHUB_OUTPUT"
            git diff origin/main..origin/dev --name-only > /tmp/changed_files.txt
          else
            echo "has_diff=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Send warning to Teams (no diffs)
        if: steps.diff_check.outputs.has_diff == 'false'
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          cat <<'EOF' > payload.json
          {
            "@type": "MessageCard",
            "@context": "http://schema.org/extensions",
            "summary": "data-engineering-services Repo Sync - 2 Hour Warning",
            "themeColor": "FFA500",
            "title": "data-engineering-services Repo Sync - 2 Hour Warning",
            "sections": [
              {
                "text": "The automated data-engineering-services Repo Sync between dev and main is scheduled to run in **2 hours** (12 PM EDT).\n\nNo code differences detected between main and dev. Sync should proceed cleanly.\n\nPlease ensure any in-flight PRs targeting dev are either merged or accounted for."
              }
            ]
          }
          EOF

          curl -s -H "Content-Type: application/json" -d @payload.json "$TEAMS_WEBHOOK_URL"

      - name: Send warning to Teams (diffs found)
        if: steps.diff_check.outputs.has_diff == 'true'
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          FILE_COUNT: ${{ steps.diff_check.outputs.file_count }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          CHANGED_FILES=$(cat /tmp/changed_files.txt | head -20 | sed 's/^/- /' | tr '\n' '\\' | sed 's/\\/\\n/g')

          TOTAL_FILES=$(cat /tmp/changed_files.txt | wc -l)
          if [ "$TOTAL_FILES" -gt 20 ]; then
            CHANGED_FILES="${CHANGED_FILES}\\n- ... and $((TOTAL_FILES - 20)) more files"
          fi

          cat <<EOF > payload.json
          {
            "@type": "MessageCard",
            "@context": "http://schema.org/extensions",
            "summary": "data-engineering-services Repo Sync - 2 Hour Warning (Code Diffs Detected)",
            "themeColor": "FF0000",
            "title": "data-engineering-services Repo Sync - 2 Hour Warning (Code Diffs Detected)",
            "sections": [
              {
                "text": "The automated data-engineering-services Repo Sync between dev and main is scheduled to run in **2 hours** (12 PM EDT).\\n\\n**${FILE_COUNT} file(s)** have code differences between main and dev. The sync will be **blocked** unless these are resolved.\\n\\n**Changed files:**\\n${CHANGED_FILES}\\n\\n[View full comparison](${REPO_URL}/compare/main...dev)"
              }
            ]
          }
          EOF

          curl -s -H "Content-Type: application/json" -d @payload.json "$TEAMS_WEBHOOK_URL"

# -----------------------------------------------------------------------------
# Job 2: Sync Execution
# -----------------------------------------------------------------------------
  sync:
    name: Sync Dev to Main
    runs-on: ubuntu-latest
    if: >-
      github.event.schedule == '0 16 * * 1' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'sync')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SYNC_PAT }}

      - name: Fetch latest branches
        run: |
          git fetch origin main
          git fetch origin dev

      - name: Check for code differences
        id: diff_check
        run: |
          echo "Comparing code between origin/main and origin/dev..."
          echo ""

          DIFF_OUTPUT=$(git diff origin/main..origin/dev --stat || true)

          if [ -n "$DIFF_OUTPUT" ]; then
            echo "has_diff=true" >> "$GITHUB_OUTPUT"
            echo "Code differences found:"
            echo "$DIFF_OUTPUT"

            # Get changed file count for the notification
            FILE_COUNT=$(git diff origin/main..origin/dev --name-only | wc -l)
            echo "file_count=${FILE_COUNT}" >> "$GITHUB_OUTPUT"

            # Write diff details to file (avoids shell escaping issues in JSON)
            git diff origin/main..origin/dev --name-only > /tmp/changed_files.txt
          else
            echo "has_diff=false" >> "$GITHUB_OUTPUT"
            echo "No code differences found. Safe to sync."
          fi

      - name: Notify and stop if differences found
        if: steps.diff_check.outputs.has_diff == 'true'
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          FILE_COUNT: ${{ steps.diff_check.outputs.file_count }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          # Build a clean list of changed files for the notification
          CHANGED_FILES=$(cat /tmp/changed_files.txt | head -20 | sed 's/^/- /' | tr '\n' '\\' | sed 's/\\/\\n/g')

          # If more than 20 files, note that the list is truncated
          TOTAL_FILES=$(cat /tmp/changed_files.txt | wc -l)
          if [ "$TOTAL_FILES" -gt 20 ]; then
            CHANGED_FILES="${CHANGED_FILES}\\n- ... and $((TOTAL_FILES - 20)) more files"
          fi

          cat <<EOF > payload.json
          {
            "@type": "MessageCard",
            "@context": "http://schema.org/extensions",
            "summary": "data-engineering-services Repo Sync - BLOCKED",
            "themeColor": "FF0000",
            "title": "data-engineering-services Repo Sync - BLOCKED",
            "sections": [
              {
                "text": "The sync has been **stopped** because **${FILE_COUNT} file(s)** have code differences between main and dev.\\n\\n**Changed files:**\\n${CHANGED_FILES}\\n\\nPlease resolve these differences and rerun the Sync workflow.\\n\\n[View full comparison](${REPO_URL}/compare/main...dev)"
              }
            ]
          }
          EOF

          curl -s -H "Content-Type: application/json" -d @payload.json "$TEAMS_WEBHOOK_URL"

          echo ""
          echo "Sync blocked due to code differences. Team has been notified."
          exit 1

      - name: Force sync dev to main
        if: steps.diff_check.outputs.has_diff == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout dev
          git reset --hard origin/main
          git push origin dev --force

          echo "Dev branch has been force-pushed to match main."

      - name: Notify sync completion
        if: steps.diff_check.outputs.has_diff == 'false'
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          MAIN_SHA=$(git rev-parse origin/main | cut -c1-7)

          cat <<EOF > payload.json
          {
            "@type": "MessageCard",
            "@context": "http://schema.org/extensions",
            "summary": "data-engineering-services Repo Sync - Complete",
            "themeColor": "00FF00",
            "title": "data-engineering-services Repo Sync - Complete",
            "sections": [
              {
                "text": "The dev branch has been force-synced to match main at commit **${MAIN_SHA}**.\\n\\nDev and main are now in Sync.\\n\\n[View repository](${REPO_URL})"
              }
            ]
          }
          EOF

          curl -s -H "Content-Type: application/json" -d @payload.json "$TEAMS_WEBHOOK_URL"
